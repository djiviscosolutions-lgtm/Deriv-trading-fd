<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institutional Trading Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main id="loginPage" class="login-page">
    <div class="login-box">
      <h2>Trading Platform</h2>
      <p class="subtitle">Enter your credentials to access the terminal</p>
      
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g., trader_one">
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <p id="loginMsg" class="error-msg"></p>
    </div>
  </main>

  <div id="dashboard" class="dashboard hidden">
    <header class="main-header">
      <div class="logo-area">
        <h1>Trading Terminal</h1>
        <span class="badge live">Live Market</span>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </header>

    <main class="grid">
      <section class="card">
        <h3>Account Balance</h3>
        <h2 id="balance" class="metric">$10,000.00</h2>
      </section>

      <section class="card">
        <h3>Asset Selection</h3>
        <select id="pair" class="form-select" onchange="changePair()">
          <option value="EUR/USD">EUR/USD</option>
          <option value="GBP/USD">GBP/USD</option>
          <option value="USD/JPY">USD/JPY</option>
          <option value="BTC/USD">BTC/USD</option>
        </select>
        <h2 id="price" class="metric price-display">1.1000</h2>
      </section>

      <section class="card">
        <h3>Execution Panel</h3>
        <div class="input-group">
          <label for="amount">Order Size (USD)</label>
          <input type="number" id="amount" placeholder="0.00" min="1">
        </div>
        <div class="btn-group">
          <button class="btn btn-success" onclick="buyTrade()">Buy / Long</button>
          <button class="btn btn-danger" onclick="sellTrade()">Sell / Short</button>
        </div>
        <p id="tradeMsg" class="status-msg"></p>
      </section>

      <section class="card full-width">
        <h3>Order Ledger</h3>
        <div class="table-wrapper">
          <ul id="history" class="ledger-list">
            <li class="ledger-empty">No executions in this session.</li>
          </ul>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
