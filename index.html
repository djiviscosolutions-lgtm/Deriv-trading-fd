<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FX Trading Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h2>Login to Trading Platform</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginMsg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard hidden">

  <header>
    <h1>FX Trading Dashboard</h1>
    <button onclick="logout()">Logout</button>
  </header>

  <div class="grid">

    <div class="card">
      <h3>Account Balance</h3>
      <h2 id="balance">$10,000</h2>
    </div>

    <div class="card">
      <h3>Selected Pair</h3>
      <select id="pair" onchange="changePair()">
        <option>EUR/USD</option>
        <option>GBP/USD</option>
        <option>USD/JPY</option>
        <option>BTC/USD</option>
      </select>

      <h2 id="price">1.1000</h2>
    </div>

    <div class="card">
      <h3>Trade Panel</h3>
      <input type="number" id="amount" placeholder="Enter amount">
      <button class="buy" onclick="buyTrade()">BUY</button>
      <button class="sell" onclick="sellTrade()">SELL</button>
      <p id="tradeMsg"></p>
    </div>

    <div class="card full">
      <h3>Trade History</h3>
      <ul id="history"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
