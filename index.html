<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institutional Trading Terminal</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

  <div id="authModal" class="modal-overlay hidden">
    <div class="auth-box">
      <div class="modal-close" onclick="closeAuthModal()">&times;</div>
      <div id="modalFormContainer"></div>
    </div>
  </div>

  <div id="dashboard" class="dashboard">
    <header class="main-header">
      <div class="logo-area">
        <h1>Trading Terminal</h1>
        <span class="badge live">Live Market</span>
      </div>
      <div id="authHeaderActions">
        <button class="btn btn-primary btn-sm" onclick="openAuthModal('login')">Sign In</button>
        <button class="btn btn-secondary btn-sm" onclick="openAuthModal('register')">Register</button>
      </div>
    </header>

    <main class="grid">
      <section class="card chart-container-card">
        <h3>Live Market Candles</h3>
        <div id="chart"></div>
      </section>

      <div class="sidebar-panels">
        <section class="card compact-card">
          <h3>Asset Selection</h3>
          <select id="pair" class="form-select" onchange="changePair()">
            <option value="EUR/USD">EUR/USD</option>
            <option value="GBP/USD">GBP/USD</option>
            <option value="USD/JPY">USD/JPY</option>
            <option value="BTC/USD">BTC/USD</option>
          </select>
          <h2 id="price" class="metric price-display">1.1000</h2>
        </section>

        <section class="card compact-card">
          <h3>Execution Panel</h3>
          <div class="input-group">
            <label for="amount">Order Size (USD)</label>
            <input type="number" id="amount" placeholder="0.00" min="1">
          </div>
          <div class="btn-group">
            <button class="btn btn-success" onclick="buyTrade()">Buy / Long</button>
            <button class="btn btn-danger" onclick="sellTrade()">Sell / Short</button>
          </div>
          <p id="tradeMsg" class="status-msg"></p>
        </section>

        <section class="card compact-card">
          <h3>Account Balance</h3>
          <h2 id="balance" class="metric">$10,000.00</h2>
        </section>
      </div>

      <section class="card full-width">
        <h3>Order Ledger</h3>
        <div class="table-wrapper">
          <ul id="history" class="ledger-list">
            <li class="ledger-empty">No executions in this session.</li>
          </ul>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
