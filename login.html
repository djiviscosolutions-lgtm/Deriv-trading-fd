<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Login | Authorization</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to access your account</p>
      </div>

      <div id="errorMessage" class="alert alert-danger hidden"></div>
      <div id="successMessage" class="alert alert-success hidden"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@company.com" autocomplete="email">
        </div>

        <div class="input-group">
          <div class="label-wrapper">
            <label for="password">Password</label>
            <a href="#" class="form-link">Forgot password?</a>
          </div>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <div class="form-actions">
          <label class="checkbox-container">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            Keep me signed in
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html" class="form-link">Create an account</a></p>
      </div>
    </div>
  </main>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      // Reset UI state
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      // Basic client-side validation
      if (!email || !password) {
        errorDiv.innerText = "Please fill in all mandatory fields.";
        errorDiv.classList.remove('hidden');
        return;
      }

      // Simulated successful authentication interaction
      successDiv.innerText = "Authentication successful! Redirecting to dashboard...";
      successDiv.classList.remove('hidden');
      
      // Clear inputs
      document.getElementById('loginForm').reset();
    }
  </script>
</body>
</html>
