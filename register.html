<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p class="subtitle">Get started with your free account today</p>
      </div>

      <div id="errorMessage" class="alert alert-danger hidden"></div>
      <div id="successMessage" class="alert alert-success hidden"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" required placeholder="John Doe" autocomplete="name">
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@company.com" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Minimum 8 characters" autocomplete="new-password">
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="Repeat your password" autocomplete="new-password">
        </div>

        <div class="form-actions">
          <label class="checkbox-container">
            <input type="checkbox" id="terms" required>
            <span class="checkmark"></span>
            I agree to the <a href="#" class="form-link">Terms of Service</a> and <a href="#" class="form-link">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Register Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="form-link">Sign in here</a></p>
      </div>
    </div>
  </main>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      
      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;
      
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      // Reset UI state
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      // Password matching validation logic
      if (password.length < 8) {
        errorDiv.innerText = "Security Requirement: Password must be at least 8 characters long.";
        errorDiv.classList.remove('hidden');
        return;
      }

      if (password !== confirmPassword) {
        errorDiv.innerText = "Mismatch Error: Passwords do not match.";
        errorDiv.classList.remove('hidden');
        return;
      }

      // Simulated success state execution
      successDiv.innerText = "Registration complete! You can now log in.";
      successDiv.classList.remove('hidden');
      
      document.getElementById('registerForm').reset();
    }
  </script>
</body>
</html>
